<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوت ویژه ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.card{
width:90%;
max-width:450px;
padding:30px;
border-radius:25px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,.2);
border:1px solid rgba(255,255,255,.3);
box-shadow:0 10px 35px rgba(0,0,0,.15);
text-align:center;
color:#fff;
position:relative;
z-index:2;
}

.hidden{display:none;}

button{
border:none;
padding:12px 25px;
border-radius:14px;
font-size:18px;
cursor:pointer;
margin:10px;
transition:.3s;
}

.yes{background:#ff4d8d;color:white;}
.no{background:white;color:#ff4d8d;position:relative;}

select,input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:16px;
}

.hearts{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
overflow:hidden;
z-index:1;
}

.heart{
position:absolute;
bottom:-50px;
font-size:25px;
animation:float linear infinite;
}

@keyframes float{
to{transform:translateY(-120vh);opacity:0;}
}

.result{
background:rgba(255,255,255,.2);
padding:15px;
border-radius:15px;
margin:20px 0;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="card">

<!-- PAGE 1 -->
<div id="page1">
<h1>سلام 😊</h1>
<p>میای باهم بریم بیرون؟</p>

<button class="yes" onclick="go(2)">بله ❤️</button>
<button class="no" id="noBtn">خیر 😅</button>
<div id="funny"></div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="hidden">
<h2>انتخاب روز و ساعت</h2>

<select id="day">
<option>شنبه</option>
<option>یکشنبه</option>
<option>دوشنبه</option>
<option>سه‌شنبه</option>
<option>چهارشنبه</option>
<option>پنج‌شنبه</option>
<option>جمعه</option>
</select>

<input type="time" id="time">

<button class="yes" onclick="go(3)">ادامه</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="hidden">
<h2>کجا بریم؟</h2>

<select id="place">
<option>کافه ☕</option>
<option>پارک 🌳</option>
<option>شهمیرزاد 🏔️</option>
<option>دور دور 🚗</option>
</select>

<button class="yes" onclick="finish()">تایید</button>
</div>

<!-- PAGE 4 -->
<div id="page4" class="hidden">
<h1>قرار ثبت شد ❤️</h1>

<div class="result" id="result"></div>

<button class="yes" onclick="copyResult()">کپی نتیجه</button>

<a href="https://t.me/ramtin_aarabi" target="_blank">
<button class="yes">ارسال در تلگرام 💌</button>
</a>
</div>

</div>

<script>
// hearts
for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(4+Math.random()*6)+"s";
document.getElementById("hearts").appendChild(h);
}

// runaway button
const noBtn=document.getElementById("noBtn");
let tries=0;

noBtn.addEventListener("mouseenter",move);
noBtn.addEventListener("touchstart",move);

function move(){
tries++;
if(tries>4){
document.getElementById("funny").innerText="این دکمه بیشتر از تو پایداری داره 😒";
}
noBtn.style.transform=`translate(${(Math.random()*200-100)}px,${(Math.random()*120-60)}px)`;
}

// navigation
function go(page){
for(let i=1;i<=4;i++){
document.getElementById("page"+i).classList.add("hidden");
}
document.getElementById("page"+page).classList.remove("hidden");
}

function finish(){
let day=document.getElementById("day").value;
let time=document.getElementById("time").value||"نامشخص";
let place=document.getElementById("place").value;

go(4);

document.getElementById("result").innerHTML=
`<p>روز: ${day}</p><p>ساعت: ${time}</p><p>مکان: ${place}</p>`;
}

function copyResult(){
navigator.clipboard.writeText(document.getElementById("result").innerText);
alert("کپی شد");
}
</script>

</body>
</html>
